<div class="container">
  <div class="wrapper">
    <div class="popup max-sm:mx-0 max-lg:my-20">
      <button (click)="closeDialog()" class="close-btn">&times;</button>
      <div
        class="center"
      >
        <img src="{{ data.img }}" class="img" alt="" />
        <div class="text">
          {{ data.text }}
        </div>
      </div>
    </div>
  </div>
</div>
